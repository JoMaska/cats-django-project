services:
  db:
    image: postgres:15-alpine
    container_name: cat-breeder-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cat-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cat-breeder-backend
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - cat-network

  frontend:
    build: ./frontend
    container_name: cat-breeder-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cat-network
    links:
      - backend

volumes:
  postgres_data:
  static_volume:

networks:
  cat-network:
    driver: bridge