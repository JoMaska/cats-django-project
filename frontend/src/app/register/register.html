<div class="register-container">
  <mat-card>
    <mat-card-title>Регистрация</mat-card-title>
    <mat-card-content>
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Логин</mat-label>
        <input matInput [(ngModel)]="username">
      </mat-form-field>
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Пароль</mat-label>
        <input matInput type="password" [(ngModel)]="password">
      </mat-form-field>
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Подтвердите пароль</mat-label>
        <input matInput type="password" [(ngModel)]="confirm">
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="register()">Зарегистрироваться</button>
      <button mat-button routerLink="/login">Вход</button>
    </mat-card-actions>
    <p *ngIf="error" class="error">{{ error }}</p>
  </mat-card>
</div>
